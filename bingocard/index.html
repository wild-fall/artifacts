<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イラストビンゴ ジェネレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Zen+Maru+Gothic:wght@400;700&display=swap');

  :root {
    --pink: #FF8FAB;
    --pink-light: #FFDDE6;
    --yellow: #FFD166;
    --yellow-light: #FFF3CC;
    --mint: #06D6A0;
    --mint-light: #CCFBF0;
    --blue: #4CC9F0;
    --blue-light: #DCF4FD;
    --purple: #9B5DE5;
    --purple-light: #F0E4FD;
    --bg: #FFF9FB;
    --surface: #FFFFFF;
    --border: #F0E0E8;
    --text: #3D2B35;
    --text-muted: #9B7B8A;
    --radius: 16px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #FF8FAB 0%, #FFB3C6 50%, #FFD166 100%);
    padding: 28px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px; right: -40px; bottom: -40px;
    background: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.06) 0px, rgba(255,255,255,0.06) 10px,
      transparent 10px, transparent 20px
    );
  }
  header h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 8px rgba(200,80,100,0.3);
    letter-spacing: -0.5px;
    position: relative;
  }
  header p {
    color: rgba(255,255,255,0.9);
    margin-top: 6px;
    font-size: 0.95rem;
    position: relative;
  }

  /* ── Main layout ── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ── Section ── */
  .section {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }

  .section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 18px;
  }
  .badge {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
    flex-shrink: 0;
  }
  .badge-pink { background: var(--pink); color: #fff; }
  .badge-yellow { background: var(--yellow); color: #7a5800; }
  .badge-mint { background: var(--mint); color: #fff; }
  .badge-blue { background: var(--blue); color: #fff; }

  /* ── Drop zone ── */
  .dropzone {
    border: 2.5px dashed var(--pink);
    border-radius: var(--radius);
    background: var(--pink-light);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--purple);
    background: var(--purple-light);
    transform: scale(1.01);
  }
  .dropzone input { display: none; }
  .dropzone-icon {
    font-size: 2.5rem;
    margin-bottom: 10px;
  }
  .dropzone p { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
  .dropzone strong { color: var(--pink); }

  /* ── Image grid ── */
  .img-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 12px;
    margin-top: 16px;
  }
  .img-item {
    position: relative;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--bg);
    aspect-ratio: 1;
  }
  .img-item img {
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 6px;
  }
  .img-item .remove-btn {
    position: absolute;
    top: 3px; right: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--pink);
    color: #fff;
    border: none;
    font-size: 0.7rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    font-weight: 900;
    transition: background 0.15s;
  }
  .img-item .remove-btn:hover { background: #e0003a; }
  .img-count {
    margin-top: 12px;
    font-size: 0.85rem;
    color: var(--text-muted);
  }
  .img-count span { color: var(--purple); font-weight: 700; }

  /* ── Settings ── */
  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 480px) { .settings-grid { grid-template-columns: 1fr; } }

  .setting-item label {
    display: block;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .setting-item select,
  .setting-item input[type="number"] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 0.95rem;
    background: var(--bg);
    color: var(--text);
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .setting-item select:focus,
  .setting-item input:focus { border-color: var(--purple); }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    cursor: pointer;
  }
  .checkbox-row input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: var(--purple);
    cursor: pointer;
  }
  .checkbox-row span { font-size: 0.9rem; }

  /* ── Info box ── */
  .info-box {
    background: var(--yellow-light);
    border: 1.5px solid var(--yellow);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 0.85rem;
    color: #7a5800;
    margin-top: 14px;
    line-height: 1.6;
  }

  /* ── Generate button ── */
  .generate-btn {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    border: none;
    background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1.15rem;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(155,93,229,0.3);
    margin-top: 8px;
  }
  .generate-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(155,93,229,0.4);
  }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled {
    background: #ddd;
    color: #999;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* ── Cards area ── */
  #cards-section { display: none; }
  .cards-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: gap;
  }
  .cards-header h2 {
    font-size: 1.1rem;
    font-weight: 700;
  }
  .print-btn {
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--mint);
    background: var(--mint-light);
    color: #046050;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .print-btn:hover { background: var(--mint); color: #fff; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  /* ── Bingo card ── */
  .bingo-card {
    background: #fff;
    border: 2.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(135deg, #FF8FAB, #FFD166);
  }
  .card-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .card-number {
    background: rgba(255,255,255,0.9);
    color: var(--pink);
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.85rem;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .card-body {
    padding: 12px;
  }
  .bingo-grid {
    display: grid;
    gap: 5px;
    width: 100%;
  }
  .bingo-cell {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    overflow: hidden;
    position: relative;
    transition: transform 0.15s;
  }
  .bingo-cell:hover { transform: scale(1.04); }
  .bingo-cell img {
    width: 85%;
    height: 85%;
    object-fit: contain;
  }
  .free-cell {
    background: linear-gradient(135deg, var(--yellow-light), var(--pink-light));
    border-color: var(--yellow);
  }
  .free-cell-text {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.7rem;
    color: var(--pink);
    text-align: center;
    line-height: 1.2;
  }

  /* ── BINGO label columns ── */
  .bingo-label-row {
    display: grid;
    gap: 5px;
    margin-bottom: 5px;
  }
  .bingo-label {
    text-align: center;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.85rem;
    color: var(--pink);
  }

  /* ── Print styles ── */
  @media print {
    header, .section, .cards-header { display: none !important; }
    #cards-section { display: block !important; }
    body { background: #fff; }
    .main { padding: 0; max-width: 100%; }
    .cards-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 10px;
    }
    .bingo-card {
      box-shadow: none;
      border: 2px solid #ccc;
      break-inside: avoid;
    }
    .bingo-cell { border: 1px solid #ddd; }
    .print-btn { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>🎯 イラストビンゴ</h1>
  <p>オリジナルイラストでビンゴカードを作ろう！</p>
</header>

<div class="main">

  <!-- Step 1: Upload -->
  <div class="section">
    <div class="section-title">
      <div class="badge badge-pink">1</div>
      <span>イラストをアップロード</span>
    </div>

    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*" multiple>
      <div class="dropzone-icon">🖼️</div>
      <p><strong>クリックまたはドラッグ＆ドロップ</strong></p>
      <p>PNG・JPG・SVGなど複数枚まとめてOK</p>
    </div>

    <div class="img-grid" id="imgGrid"></div>
    <div class="img-count" id="imgCount"></div>
  </div>

  <!-- Step 2: Settings -->
  <div class="section">
    <div class="section-title">
      <div class="badge badge-yellow">2</div>
      <span>カード設定</span>
    </div>

    <div class="settings-grid">
      <div class="setting-item">
        <label>グリッドサイズ</label>
        <select id="gridSize">
          <option value="3">3×3（9マス）</option>
          <option value="4">4×4（16マス）</option>
          <option value="5" selected>5×5（25マス）</option>
        </select>
      </div>
      <div class="setting-item">
        <label>カード枚数</label>
        <input type="number" id="cardCount" value="6" min="1" max="100">
      </div>
      <div class="setting-item">
        <label>フリースペース</label>
        <label class="checkbox-row">
          <input type="checkbox" id="freeCenter" checked>
          <span>中央をFREEにする</span>
        </label>
      </div>
      <div class="setting-item">
        <label>カードタイトル</label>
        <input type="text" id="cardTitle" placeholder="BINGO" style="padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.95rem;background:var(--bg);width:100%;outline:none;" value="BINGO">
      </div>
    </div>

    <div class="info-box" id="infoBox">
      💡 グリッドサイズに応じて必要なイラスト数が変わります。イラストを先にアップロードしてください。
    </div>
  </div>

  <!-- Step 3: Generate -->
  <div class="section">
    <div class="section-title">
      <div class="badge badge-mint">3</div>
      <span>カードを生成</span>
    </div>
    <button class="generate-btn" id="generateBtn" onclick="generateCards()">✨ ビンゴカードを生成する</button>
  </div>

  <!-- Generated cards -->
  <div id="cards-section">
    <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="badge badge-blue">4</div>
        <span style="font-size:1rem;font-weight:700;">生成されたカード</span>
      </div>
      <button class="print-btn" onclick="window.print()">🖨️ 印刷する</button>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

</div>

<script>
  const images = [];
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const imgGrid = document.getElementById('imgGrid');
  const imgCount = document.getElementById('imgCount');
  const gridSizeEl = document.getElementById('gridSize');
  const freeCenterEl = document.getElementById('freeCenter');
  const infoBox = document.getElementById('infoBox');
  const generateBtn = document.getElementById('generateBtn');

  function updateInfo() {
    const size = parseInt(gridSizeEl.value);
    const freeCenter = freeCenterEl.checked;
    const total = size * size;
    const needed = freeCenter && size % 2 === 1 ? total - 1 : total;
    const has = images.length;
    const ok = has >= needed;
    infoBox.innerHTML = ok
      ? `✅ イラスト <strong>${has}枚</strong> / 必要数 <strong>${needed}枚</strong>（${size}×${size}）― 生成できます！`
      : `💡 ${size}×${size}には最低 <strong>${needed}枚</strong>のイラストが必要です。現在 <strong>${has}枚</strong>。あと <strong>${needed - has}枚</strong>追加してください。`;
    infoBox.style.background = ok ? 'var(--mint-light)' : 'var(--yellow-light)';
    infoBox.style.borderColor = ok ? 'var(--mint)' : 'var(--yellow)';
    infoBox.style.color = ok ? '#046050' : '#7a5800';
    generateBtn.disabled = !ok;
  }

  function renderImgGrid() {
    imgGrid.innerHTML = '';
    images.forEach((src, i) => {
      const item = document.createElement('div');
      item.className = 'img-item';
      item.innerHTML = `<img src="${src}"><button class="remove-btn" onclick="removeImage(${i})">✕</button>`;
      imgGrid.appendChild(item);
    });
    imgCount.innerHTML = images.length > 0
      ? `アップロード済み: <span>${images.length}</span> 枚`
      : '';
    updateInfo();
  }

  function removeImage(i) {
    images.splice(i, 1);
    renderImgGrid();
  }

  function loadFiles(files) {
    const readers = Array.from(files).map(file => new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => { images.push(e.target.result); res(); };
      reader.readAsDataURL(file);
    }));
    Promise.all(readers).then(renderImgGrid);
  }

  fileInput.addEventListener('change', e => loadFiles(e.target.files));

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    loadFiles(e.dataTransfer.files);
  });

  gridSizeEl.addEventListener('change', updateInfo);
  freeCenterEl.addEventListener('change', updateInfo);
  updateInfo();

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generateCards() {
    const size = parseInt(gridSizeEl.value);
    const count = parseInt(document.getElementById('cardCount').value);
    const freeCenter = freeCenterEl.checked && size % 2 === 1;
    const title = document.getElementById('cardTitle').value || 'BINGO';
    const centerIdx = freeCenter ? Math.floor(size * size / 2) : -1;
    const cardsGrid = document.getElementById('cardsGrid');
    const cardsSection = document.getElementById('cards-section');

    cardsGrid.innerHTML = '';
    cardsSection.style.display = 'block';
    cardsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

    const labels = 'BINGO';
    const showLabels = size === 5;

    for (let c = 0; c < count; c++) {
      const shuffled = shuffle(images);
      const card = document.createElement('div');
      card.className = 'bingo-card';

      const themes = [
        { grad: 'linear-gradient(135deg, #FF4D6D, #FF8FAB)', accent: '#FF4D6D', light: '#FFF0F3', label: '#D4002A' },
        { grad: 'linear-gradient(135deg, #4361EE, #4CC9F0)', accent: '#4361EE', light: '#EEF1FD', label: '#2D3FCC' },
        { grad: 'linear-gradient(135deg, #9B5DE5, #C77DFF)', accent: '#9B5DE5', light: '#F3EAFE', label: '#7C3CC8' },
        { grad: 'linear-gradient(135deg, #FF6B35, #FFAA00)', accent: '#FF6B35', light: '#FFF2EB', label: '#C94800' },
        { grad: 'linear-gradient(135deg, #52B788, #95D5B2)', accent: '#52B788', light: '#EDFAF3', label: '#1F7A4F' },
        { grad: 'linear-gradient(135deg, #F72585, #7209B7)', accent: '#F72585', light: '#FCE8F5', label: '#C01870' },
      ];
      const theme = themes[c % themes.length];
      const grad = theme.grad;

      card.style.border = `2.5px solid ${theme.accent}`;
      card.innerHTML = `
        <div class="card-header" style="background:${grad}">
          <div class="card-title">${title}</div>
          <div class="card-number">No. ${String(c + 1).padStart(3, '0')}</div>
        </div>
        <div class="card-body" style="background:${theme.light}">
          ${showLabels ? `
          <div class="bingo-label-row" style="grid-template-columns:repeat(${size},1fr)">
            ${labels.split('').slice(0, size).map(l => `<div class="bingo-label" style="color:${theme.label}">${l}</div>`).join('')}
          </div>` : ''}
          <div class="bingo-grid" style="grid-template-columns:repeat(${size},1fr)">
            ${Array.from({length: size * size}).map((_, i) => {
              if (i === centerIdx) {
                return `<div class="bingo-cell free-cell" style="border-color:${theme.accent};background:white"><div class="free-cell-text" style="color:${theme.label}">⭐<br>FREE</div></div>`;
              }
              const imgIdx = freeCenter
                ? (i < centerIdx ? i : i - 1)
                : i;
              const src = shuffled[imgIdx % shuffled.length];
              return `<div class="bingo-cell" style="border-color:${theme.accent}22;background:white"><img src="${src}" loading="lazy"></div>`;
            }).join('')}
          </div>
        </div>
      `;
      cardsGrid.appendChild(card);
    }
  }
</script>
</body>
</html>
