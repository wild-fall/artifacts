<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>入学おめでとう！壁面飾りメーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --bg: #f3f0ff;
    --accent: #7c3aed;
    --accent2: #ec4899;
    --text: #2d1b6e;
    --gray: #9ca3af;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: white;
    text-align: center;
    padding: 18px 20px 14px;
  }
  header h1 { font-size: 20px; font-weight: 900; letter-spacing: 2px; }
  header p  { font-size: 12px; opacity: 0.85; margin-top: 4px; }

  /* ===== EDITOR ===== */
  .editor {
    max-width: 800px;
    margin: 24px auto;
    padding: 0 16px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px; height: 16px;
    background: linear-gradient(#7c3aed, #ec4899);
    border-radius: 2px;
  }

  .input-row {
    background: white;
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 2px 16px rgba(124,58,237,0.1);
    margin-bottom: 20px;
  }

  .text-input-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .text-input-wrap input[type="text"] {
    flex: 1;
    min-width: 180px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 8px;
    padding: 10px 16px;
    border: 3px solid #e9d5ff;
    border-radius: 12px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }
  .text-input-wrap input[type="text"]:focus { border-color: var(--accent); }

  .btn-apply {
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: white;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 14px;
    border: none;
    border-radius: 12px;
    padding: 12px 22px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(124,58,237,0.3);
    transition: transform .1s;
    white-space: nowrap;
  }
  .btn-apply:active { transform: translateY(2px); }

  .cards-editor {
    background: white;
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 2px 16px rgba(124,58,237,0.1);
    margin-bottom: 20px;
  }

  .card-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed #ede9fe;
    flex-wrap: wrap;
  }
  .card-row:last-child { border-bottom: none; }

  .card-num {
    width: 26px; height: 26px;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: white;
    font-size: 12px;
    font-weight: 900;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .char-display {
    width: 50px; height: 50px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    font-weight: 900;
    color: white;
    flex-shrink: 0;
    box-shadow: 0 4px 0 rgba(0,0,0,0.18), 0 6px 14px rgba(0,0,0,0.15);
    border: 3px solid rgba(255,255,255,0.6);
    position: relative;
    overflow: hidden;
    text-shadow: 2px 3px 0 rgba(0,0,0,0.2);
  }
  .char-display::before {
    content: '';
    position: absolute;
    width: 60%; height: 45%;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.5) 0%, transparent 80%);
    top: 8%; left: 12%;
  }

  .color-swatches {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    flex: 1;
  }

  .swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform .15s, border-color .15s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.2); }
  .swatch.active {
    border-color: var(--text);
    transform: scale(1.15);
    box-shadow: 0 0 0 2px white, 0 0 0 4px var(--text);
  }

  /* A4 full print button per card */
  .btn-full {
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: white;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 11px;
    border: none;
    border-radius: 10px;
    padding: 8px 12px;
    cursor: pointer;
    box-shadow: 0 3px 0 #b91c1c, 0 5px 12px rgba(239,68,68,0.3);
    transition: transform .1s, box-shadow .1s;
    white-space: nowrap;
    flex-shrink: 0;
    line-height: 1.3;
    text-align: center;
  }
  .btn-full:active { transform: translateY(2px); box-shadow: 0 1px 0 #b91c1c; }


  /* Print buttons row */
  .print-btns {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .btn-print {
    flex: 1;
    min-width: 200px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 15px;
    border: none;
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    box-shadow: 0 6px 0 #047857, 0 10px 20px rgba(5,150,105,0.3);
    transition: transform .1s, box-shadow .1s;
    letter-spacing: 1px;
  }
  .btn-print:active { transform: translateY(4px); box-shadow: 0 2px 0 #047857; }

  /* ===== TOGGLE PANEL ===== */
  .toggle-panel {
    background: white;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 2px 16px rgba(124,58,237,0.1);
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px 28px;
    align-items: center;
  }
  .toggle-item {
    display: flex;
    align-items: center;
    gap: 9px;
    cursor: pointer;
    user-select: none;
  }
  .toggle-switch {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: #d1d5db;
    transition: background .2s;
  }
  .toggle-switch input:checked + .toggle-track { background: linear-gradient(135deg, #7c3aed, #ec4899); }
  .toggle-knob {
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transition: transform .2s;
    pointer-events: none;
  }
  .toggle-switch input:checked ~ .toggle-knob { transform: translateX(20px); }
  .toggle-label { font-size: 13px; font-weight: 900; color: var(--text); }

  /* toggle-off helpers */
  .bg-no-dots::after   { display: none !important; }
  .bg-no-shine::before { display: none !important; }
  .char-no-stroke { -webkit-text-stroke: 0 !important; }

  /* ===== PREVIEW LABEL ===== */
  .preview-label {
    text-align: center;
    font-size: 12px;
    color: var(--gray);
    margin-bottom: 8px;
  }

  /* ===== MULTI-CARD PRINT PAGE ===== */
  #printPageMulti {
    width: 210mm;
    min-height: 297mm;
    background: white;
    margin: 0 auto 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    align-items: center;
    justify-items: center;
    gap: 6mm;
    padding: 10mm 8mm;
    box-shadow: 0 4px 30px rgba(0,0,0,0.12);
  }

  /* ===== FULL A4 PRINT PAGE ===== */
  /* printPageFull: shown as preview on screen when populated */
  #printPageFull > .full-page:first-child {
    margin-top: 0;
  }

  /* Force square aspect on the full card wrapper */
  .p-card-xl-wrap {
    width: 192mm;
    height: 192mm;
    flex-shrink: 0;
  }

  .preview-sep {
    text-align: center;
    font-size: 12px;
    color: var(--gray);
    margin: 16px 0 8px;
  }

  /* ===== CARD SHARED STYLES ===== */
  .p-card {
    width: 62mm;
    height: 62mm;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    outline: 2.5px dashed rgba(0,0,0,0.22);
    outline-offset: 5px;
    position: relative;
  }

  /* Full-page circle: strictly square so border-radius:50% = perfect circle */
  .p-card-xl {
    width: 192mm;
    height: 192mm;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    outline: 3px dashed rgba(0,0,0,0.2);
    outline-offset: 8px;
    position: relative;
    flex-shrink: 0;
  }

  .p-card-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: visible;
    border: 7px solid rgba(255,255,255,0.80);
  }

  /* The colored circle bg sits behind, clipped to circle */
  .p-card-bg {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    z-index: 0;
  }

  /* Shine goes inside bg */
  .p-card-bg::before {
    content: '';
    position: absolute;
    width: 55%; height: 40%;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 80%);
    top: 10%; left: 12%;
    z-index: 1;
    pointer-events: none;
  }
  /* Dot pattern overlay */
  .p-card-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.18) 1.5px, transparent 1.5px);
    background-size: 12px 12px;
    z-index: 2;
    pointer-events: none;
  }

  .p-card-xl .p-card-inner {
    border-width: 22px;
  }



  .p-char {
    font-size: 80pt;
    font-weight: 900;
    line-height: 1;
    color: white;
    text-shadow: none;
    -webkit-text-stroke: 3px rgba(255,255,255,0.45);
    paint-order: stroke fill;
    z-index: 2;
    position: relative;
  }

  /* XL char: much bigger for full page */
  .p-char-xl {
    font-size: 320pt;
    font-weight: 900;
    line-height: 1;
    color: white;
    text-shadow: none;
    -webkit-text-stroke: 10px rgba(255,255,255,0.40);
    paint-order: stroke fill;
    z-index: 2;
    position: relative;
  }

  .p-sparkle {
    position: absolute;
    z-index: 4;
    pointer-events: none;
    overflow: visible;
  }

  /* ===== FULL PAGE: each card on its own A4 ===== */
  #printPageFull {
    display: none;
  }
  .full-page {
    width: 210mm;
    height: 297mm;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.12);
  }

  /* ===== PRINT MODE ===== */
  @media print {
    body { background: white; }
    header, .editor, .preview-label, .preview-sep { display: none !important; }

    #printPageMulti {
      box-shadow: none;
      margin: 0;
      page-break-after: always;
    }
    #printPageFull {
      display: block !important;
    }
    .full-page {
      box-shadow: none;
      margin: 0;
      page-break-after: always;
    }
    .full-page:last-child {
      page-break-after: avoid;
    }
  }
  @page { size: A4; margin: 0; }

  /* ===== ICON PICKER ===== */
  .icon-picker-btn {
    background: linear-gradient(135deg, #f472b6, #a855f7);
    color: white;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 13px;
    border: none;
    border-radius: 10px;
    padding: 9px 14px;
    cursor: pointer;
    box-shadow: 0 3px 0 #7e22ce, 0 5px 12px rgba(168,85,247,0.3);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .icon-picker-btn:active { transform: translateY(2px); }

  .icon-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .icon-modal-overlay.open { display: flex; }
  .icon-modal {
    background: white;
    border-radius: 20px;
    padding: 24px;
    width: min(540px, 92vw);
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .icon-modal h2 {
    font-size: 16px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 16px;
  }
  .icon-category {
    font-size: 11px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 1px;
    margin: 12px 0 6px;
    text-transform: uppercase;
  }
  .icon-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 4px;
  }
  .icon-btn {
    width: 48px; height: 48px;
    border-radius: 12px;
    border: 2px solid #e9d5ff;
    background: #faf5ff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--accent);
    transition: background .15s, border-color .15s, transform .1s;
    flex-shrink: 0;
  }
  .icon-btn:hover { background: #ede9fe; border-color: var(--accent); transform: scale(1.12); }
  .icon-btn i { pointer-events: none; }
  .icon-modal-close {
    display: block;
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #f3f4f6;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    font-weight: 900;
    color: #6b7280;
    cursor: pointer;
  }
  .icon-modal-close:hover { background: #e5e7eb; }

  /* FA icon rendering in card */
  .p-char i, .p-char-xl i {
    display: block;
    line-height: 1;
  }
  .p-char-xl i { font-size: 0.9em; }
</style>
</head>
<body>

<header>
  <h1>🎉 壁面飾りメーカー 🎉</h1>
  <p>文字とカラーを自由にカスタマイズ → A4印刷して切り抜いて使えます</p>
</header>

<div class="editor">

  <div class="section-title">STEP 1　テキストを入力 / アイコンを追加</div>
  <div class="input-row">
    <div class="text-input-wrap">
      <input type="text" id="textInput" value="おめでとう" maxlength="9" placeholder="例：おめでとう">
      <button class="btn-apply" onclick="applyText()">文字を反映する</button>
      <button class="icon-picker-btn" onclick="openIconPicker()">🎨 アイコンを追加</button>
    </div>
  </div>

  <!-- Icon picker modal -->
  <div class="icon-modal-overlay" id="iconModal">
    <div class="icon-modal">
      <h2>🎨 アイコンを選ぶ（クリックでカードに追加）</h2>
      <div class="icon-category">お祝い・パーティー</div>
      <div class="icon-grid" id="iconGrid"></div>
      <div class="icon-category">動物・自然</div>
      <div class="icon-grid" id="iconGrid2"></div>
      <div class="icon-category">食べ物・もの</div>
      <div class="icon-grid" id="iconGrid3"></div>
      <button class="icon-modal-close" onclick="closeIconPicker()">閉じる</button>
    </div>
  </div>

  <div class="section-title">STEP 2　1文字ずつカラーを選ぶ</div>
  <div class="cards-editor" id="cardEditor"></div>

  <div class="section-title">STEP 3　デザインをカスタマイズ</div>
  <div class="toggle-panel">
    <label class="toggle-item">
      <div class="toggle-switch">
        <input type="checkbox" id="togStars" checked onchange="render()">
        <div class="toggle-track"></div>
        <div class="toggle-knob"></div>
      </div>
      <span class="toggle-label">✦ 星・飾り</span>
    </label>
    <label class="toggle-item">
      <div class="toggle-switch">
        <input type="checkbox" id="togDots" checked onchange="render()">
        <div class="toggle-track"></div>
        <div class="toggle-knob"></div>
      </div>
      <span class="toggle-label">・・ ドットパターン</span>
    </label>
    <label class="toggle-item">
      <div class="toggle-switch">
        <input type="checkbox" id="togShine" checked onchange="render()">
        <div class="toggle-track"></div>
        <div class="toggle-knob"></div>
      </div>
      <span class="toggle-label">✨ 光沢</span>
    </label>
    <label class="toggle-item">
      <div class="toggle-switch">
        <input type="checkbox" id="togStroke" checked onchange="render()">
        <div class="toggle-track"></div>
        <div class="toggle-knob"></div>
      </div>
      <span class="toggle-label">Ａ 文字の縁取り</span>
    </label>
  </div>

  <div class="print-btns">
    <button class="btn-print" onclick="printAll()">🖨️ 印刷する</button>
  </div>

</div>

<div class="preview-label">↓ 印刷プレビュー（1ページ目：まとめ / 2ページ目以降：1文字ずつA4）</div>
<div id="printPageMulti"></div>
<div id="printPageFull"></div>

<script>
  const COLORS = [
    { id:'pink',   label:'ピンク',  g:['#ffadd6','#f50073'], sh:'#b5004e' },
    { id:'orange', label:'オレンジ',g:['#ffe08a','#ff6a00'], sh:'#b55e00' },
    { id:'green',  label:'グリーン',g:['#aaff66','#1dbf00'], sh:'#198a10' },
    { id:'blue',   label:'ブルー',  g:['#7de8ff','#007bce'], sh:'#006fa0' },
    { id:'purple', label:'パープル',g:['#e5aaff','#8800e0'], sh:'#6910b0' },
    { id:'yellow', label:'イエロー',g:['#fff59a','#f5a800'], sh:'#c08800' },
    { id:'red',    label:'レッド',  g:['#ff9999','#e50000'], sh:'#a00000' },
    { id:'teal',   label:'ティール',g:['#80ffdf','#00a87a'], sh:'#007a63' },
  ];

  // Shape SVG generators — all centered at 0,0 in a size×size viewBox
  function svgWrap(size, opacity, rotation, id, pathEl) {
    const glow = Math.round(size * 0.28);
    const sh   = Math.round(size * 0.10);
    const bl   = Math.round(size * 0.18);
    return `<svg class="p-sparkle" width="${size}" height="${size}" viewBox="-${size/2} -${size/2} ${size} ${size}"
      style="transform:rotate(${rotation}deg);filter:drop-shadow(0 0 ${glow}px rgba(255,255,255,0.75)) drop-shadow(0 ${sh}px ${bl}px rgba(0,0,0,0.25))">
      <defs>
        <radialGradient id="${id}" cx="35%" cy="28%" r="68%">
          <stop offset="0%" stop-color="white" stop-opacity="${opacity}"/>
          <stop offset="100%" stop-color="white" stop-opacity="${(opacity*0.30).toFixed(2)}"/>
        </radialGradient>
      </defs>
      ${pathEl}
    </svg>`;
  }

  // 4-point sparkle
  function shape4Sparkle(size, op, rot, id) {
    const h=size/2, s=size*0.22, l=size*0.06;
    const p = `<path d="M0,-${h} C${l},-${s} ${s},-${l} ${h},0 C${s},${l} ${l},${s} 0,${h} C-${l},${s} -${s},${l} -${h},0 C-${s},-${l} -${l},-${s} 0,-${h}Z" fill="url(#${id})"/>`;
    return svgWrap(size, op, rot, id, p);
  }

  // 5-pointed star
  function shape5Star(size, op, rot, id) {
    const R=size*0.48, r=size*0.20;
    let pts='';
    for(let i=0;i<10;i++){
      const a=(i*36-90)*Math.PI/180;
      const rad=i%2===0?R:r;
      pts+=`${(Math.cos(a)*rad).toFixed(2)},${(Math.sin(a)*rad).toFixed(2)} `;
    }
    const p = `<polygon points="${pts.trim()}" fill="url(#${id})"/>`;
    return svgWrap(size, op, rot, id, p);
  }

  // Heart
  function shapeHeart(size, op, rot, id) {
    const s=size*0.46;
    // heart: two bezier arcs
    const p = `<path d="M0,${s*0.3}
      C${s*0.1},${s*0.7} ${s},${s*0.7} ${s},${s*0.15}
      C${s},${-s*0.35} ${s*0.45},${-s*0.55} 0,${-s*0.1}
      C${-s*0.45},${-s*0.55} ${-s},${-s*0.35} ${-s},${s*0.15}
      C${-s},${s*0.7} ${-s*0.1},${s*0.7} 0,${s*0.3}Z"
      fill="url(#${id})"/>`;
    return svgWrap(size, op, rot, id, p);
  }

  // 6-point snowflake / asterisk
  function shapeSnowflake(size, op, rot, id) {
    const h=size*0.46, w=size*0.06, d=size*0.14;
    let paths='';
    for(let i=0;i<3;i++){
      const a=i*60*Math.PI/180;
      const cos=Math.cos(a), sin=Math.sin(a);
      // bar
      paths+=`<rect x="${-w/2}" y="${-h}" width="${w}" height="${h*2}" rx="${w/2}"
        fill="url(#${id})" transform="rotate(${i*60})"/>`;
      // small diagonal ticks
      [-0.5,0.5].forEach(side=>{
        const tx=side*d, ty=-h*0.52;
        paths+=`<rect x="${-w*0.4}" y="${-d*0.9}" width="${w*0.8}" height="${d*1.8}" rx="${w*0.4}"
          fill="url(#${id})" transform="rotate(${i*60}) translate(${tx},${ty}) rotate(${side*50})"/>`;
      });
    }
    return svgWrap(size, op, rot, id, paths);
  }

  // Diamond (rhombus)
  function shapeDiamond(size, op, rot, id) {
    const h=size*0.50, w=size*0.32;
    const p = `<polygon points="0,${-h} ${w},0 0,${h} ${-w},0" fill="url(#${id})"/>`;
    return svgWrap(size, op, rot, id, p);
  }

  // Moon crescent
  function shapeMoon(size, op, rot, id) {
    const r=size*0.44;
    const p = `<path d="M${r*0.15},${-r}
      A${r},${r} 0 1,1 ${r*0.15},${r}
      A${r*0.7},${r*0.7} 0 1,0 ${r*0.15},${-r}Z"
      fill="url(#${id})"/>`;
    return svgWrap(size, op, rot, id, p);
  }

  // All shapes array
  const SHAPES = [shape4Sparkle, shape5Star, shapeMoon];

  function sparkle(size, opacity, rotation, shapeIdx, uid) {
    const fn = SHAPES[shapeIdx % SHAPES.length];
    const id = `sg${uid}`;
    return fn(size, opacity, rotation, id);
  }

  // Generate N random star positions along the circle edge
  // r: radius ratio (0-1), spread: how much to vary radius
  function randomStars(n, minSz, maxSz, seed) {
    // Simple seeded random so layout stays stable per card (doesn't re-randomize on color change)
    let s = seed || 42;
    function rnd() { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; }

    const stars = [];
    for (let i = 0; i < n; i++) {
      const baseAngle = (i / n) * 360;
      const jitter = (rnd() - 0.5) * (360 / n * 0.7);
      const angle = (baseAngle + jitter + 360) % 360;
      const rad = angle * Math.PI / 180;
      const r = 0.68 + rnd() * 0.20;
      const cx = +(50 + r * 50 * Math.cos(rad)).toFixed(1);
      const cy = +(50 + r * 50 * Math.sin(rad)).toFixed(1);
      const sz = Math.round(minSz + rnd() * (maxSz - minSz));
      const op = +(0.75 + rnd() * 0.22).toFixed(2);
      const rot = Math.round((rnd() - 0.5) * 70);
      const shapeIdx = Math.floor(rnd() * SHAPES.length);
      stars.push({cx, cy, sz, op, rot, shapeIdx});
    }
    return stars;
  }

  let cards = [];
  let printMode = 'multi'; // 'multi' | 'full'

  function colorById(id){ return COLORS.find(c=>c.id===id) || COLORS[0]; }
  function grad(col){ return `radial-gradient(circle at 38% 35%, ${col.g[0]}, ${col.g[1]})`; }

  // card: { char, colorId, icon? }  icon = FA class string e.g. "fa-solid fa-star"
  const ICON_CATEGORIES = [
    { gridId: 'iconGrid', icons: [
      'fa-solid fa-star','fa-solid fa-heart','fa-solid fa-gift','fa-solid fa-crown',
      'fa-solid fa-cake-candles','fa-solid fa-champagne-glasses','fa-solid fa-music',
      'fa-solid fa-bell','fa-solid fa-bolt','fa-solid fa-fire','fa-solid fa-sun',
      'fa-solid fa-rainbow','fa-solid fa-wand-magic-sparkles','fa-solid fa-medal',
      'fa-solid fa-trophy','fa-solid fa-graduation-cap','fa-solid fa-school',
      'fa-solid fa-pencil','fa-solid fa-book','fa-solid fa-backpack',
    ]},
    { gridId: 'iconGrid2', icons: [
      'fa-solid fa-dove','fa-solid fa-paw','fa-solid fa-fish','fa-solid fa-frog',
      'fa-solid fa-cat','fa-solid fa-dog','fa-solid fa-horse','fa-solid fa-feather',
      'fa-solid fa-leaf','fa-solid fa-seedling','fa-solid fa-tree','fa-solid fa-flower',
      'fa-solid fa-clover','fa-solid fa-snowflake','fa-solid fa-cloud','fa-solid fa-moon',
    ]},
    { gridId: 'iconGrid3', icons: [
      'fa-solid fa-ice-cream','fa-solid fa-cupcake','fa-solid fa-apple-whole',
      'fa-solid fa-lemon','fa-solid fa-carrot','fa-solid fa-pizza-slice',
      'fa-solid fa-burger','fa-solid fa-mug-hot','fa-solid fa-gamepad',
      'fa-solid fa-bicycle','fa-solid fa-car','fa-solid fa-bus-school',
      'fa-solid fa-rocket','fa-solid fa-robot','fa-solid fa-alien','fa-solid fa-face-laugh-beam',
    ]},
  ];

  function openIconPicker(){
    ICON_CATEGORIES.forEach(cat => {
      const grid = document.getElementById(cat.gridId);
      if(!grid) return;
      grid.innerHTML = cat.icons.map(ic => `
        <button class="icon-btn" title="${ic}" onclick="addIconCard('${ic}')">
          <i class="${ic}"></i>
        </button>`).join('');
    });
    document.getElementById('iconModal').classList.add('open');
  }

  function closeIconPicker(){
    document.getElementById('iconModal').classList.remove('open');
  }

  function addIconCard(iconClass){
    cards.push({ char: '', icon: iconClass, colorId: COLORS[cards.length % COLORS.length].id });
    render();
    closeIconPicker();
  }

  function removeCard(index){
    cards.splice(index, 1);
    render();
  }

  function applyText(){
    const txt = document.getElementById('textInput').value.trim();
    if(!txt) return;
    const old = [...cards];
    cards = Array.from(txt).map((ch, i) => ({
      char: ch,
      colorId: old[i] ? old[i].colorId : COLORS[i % COLORS.length].id
    }));
    render();
  }

  function setColor(index, colorId){
    cards[index].colorId = colorId;
    render();
  }

  function getOpts(){
    return {
      stars:  document.getElementById('togStars')?.checked  ?? true,
      dots:   document.getElementById('togDots')?.checked   ?? true,
      shine:  document.getElementById('togShine')?.checked  ?? true,
      stroke: document.getElementById('togStroke')?.checked ?? true,
    };
  }

  function render(){
    renderEditor();
    renderMulti();
    renderAllFull();
  }

  function renderEditor(){
    const el = document.getElementById('cardEditor');
    if(!cards.length){
      el.innerHTML = '<p style="color:#aaa;font-size:13px;text-align:center;padding:16px">テキストを入力してください</p>';
      return;
    }
    el.innerHTML = cards.map((card, i) => {
      const col = colorById(card.colorId);
      const swatches = COLORS.map(c => `
        <div class="swatch ${c.id === card.colorId ? 'active' : ''}"
          style="background:radial-gradient(circle at 38% 35%, ${c.g[0]}, ${c.g[1]})"
          title="${c.label}"
          onclick="setColor(${i},'${c.id}')"></div>
      `).join('');
      return `
        <div class="card-row">
          <div class="card-num">${i+1}</div>
          <div class="char-display"
            style="background:${grad(col)};box-shadow:0 4px 0 ${col.sh},0 6px 14px rgba(0,0,0,0.15)">
            ${card.icon ? `<i class="${card.icon}" style="font-size:22px;color:white"></i>` : card.char}
          </div>
          <button onclick="removeCard(${i})" style="background:none;border:none;font-size:16px;cursor:pointer;color:#d1d5db;padding:0 2px;flex-shrink:0" title="削除">✕</button>
          <div class="color-swatches">${swatches}</div>

        </div>
      `;
    }).join('');
  }

  function starsHtml(n, minSz, maxSz, seed) {
    return randomStars(n, minSz, maxSz, seed).map(({cx, cy, sz, op, rot, shapeIdx}, i) => {
      const uid = `${seed}_${i}`;
      return `<div style="position:absolute;left:${cx}%;top:${cy}%;transform:translate(-50%,-50%);z-index:4;pointer-events:none">${sparkle(sz, op, rot, shapeIdx, uid)}</div>`;
    }).join('');
  }

  function renderMulti(){
    const el = document.getElementById('printPageMulti');
    if(!cards.length){ el.innerHTML = ''; return; }
    const o = getOpts();
    el.innerHTML = cards.map(card => {
      const col = colorById(card.colorId);
      const bgCls = ['p-card-bg', o.dots?'':'bg-no-dots', o.shine?'':'bg-no-shine'].filter(Boolean).join(' ');
      const charCls = ['p-char', o.stroke?'':'char-no-stroke'].filter(Boolean).join(' ');
      const stars = o.stars ? starsHtml(6, 12, 22, (card.icon ? card.icon.split(" ").join("").split("").reduce((a,c)=>a+c.charCodeAt(0),0) : card.char.codePointAt(0))) : '';
      return `
        <div class="p-card">
          <div class="p-card-inner">
            <div class="${bgCls}" style="background:${grad(col)}"></div>
            ${stars}
            <div class="${charCls}">${card.icon ? `<i class="${card.icon}"></i>` : card.char}</div>
          </div>
        </div>`;
    }).join('');
  }

  function renderAllFull(){
    if(!cards.length) return;
    const o = getOpts();
    const el = document.getElementById('printPageFull');
    el.style.display = 'block';
    el.innerHTML = cards.map(card => {
      const col = colorById(card.colorId);
      const bgCls = ['p-card-bg', o.dots?'':'bg-no-dots', o.shine?'':'bg-no-shine'].filter(Boolean).join(' ');
      const charCls = ['p-char-xl', o.stroke?'':'char-no-stroke'].filter(Boolean).join(' ');
      const stars = o.stars ? starsHtml(6, 48, 88, (card.icon ? card.icon.split(" ").join("").split("").reduce((a,c)=>a+c.charCodeAt(0),0) : card.char.codePointAt(0))) : '';
      return `
        <div class="full-page">
          <div class="p-card-xl-wrap">
            <div class="p-card-xl">
              <div class="p-card-inner">
                <div class="${bgCls}" style="background:${grad(col)}"></div>
                ${stars}
                <div class="${charCls}">${card.icon ? `<i class="${card.icon}"></i>` : card.char}</div>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function printAll(){
    renderAllFull();
    window.print();
  }

  applyText();

</script>
</body>
</html>
